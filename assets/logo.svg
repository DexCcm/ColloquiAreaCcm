<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="ColloquiTeam logo">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#8B3A1A"/>
      <stop offset="100%" stop-color="#6B2A10"/>
    </linearGradient>
  </defs>

  <!-- Sfondo arrotondato gradiente terracotta -->
  <rect width="120" height="120" rx="24" ry="24" fill="url(#bg-gradient)"/>

  <!-- Radar: cerchi concentrici -->
  <g stroke="#FBF7EE" stroke-opacity=".22" fill="none" stroke-width="1.2">
    <circle cx="60" cy="60" r="50"/>
    <circle cx="60" cy="60" r="40"/>
    <circle cx="60" cy="60" r="28"/>
    <circle cx="60" cy="60" r="16"/>
  </g>
  <!-- 8 raggi -->
  <g stroke="#FBF7EE" stroke-opacity=".22" stroke-width="1.2">
    <line x1="60" y1="10" x2="60" y2="110"/>
    <line x1="10" y1="60" x2="110" y2="60"/>
    <line x1="24.6" y1="24.6" x2="95.4" y2="95.4"/>
    <line x1="95.4" y1="24.6" x2="24.6" y2="95.4"/>
  </g>

  <!-- Poligono autovalutazione (avorio, area soft) -->
  <polygon
    points="60,14 95,28 106,60 93,90 60,100 30,93 14,60 25,28"
    fill="#FBF7EE" fill-opacity=".10"
    stroke="#FBF7EE" stroke-opacity=".5" stroke-width="1.8"
    stroke-linejoin="round"/>

  <!-- Poligono valutazione responsabile (sage tratteggiato) -->
  <polygon
    points="60,22 88,32 99,60 86,86 60,93 36,86 22,60 32,34"
    fill="none"
    stroke="#D9E8DC" stroke-opacity=".75" stroke-width="1.5"
    stroke-dasharray="4,3" stroke-linejoin="round"/>

  <!-- Silhouette persona — al centro, focal point -->
  <!-- Testa -->
  <circle cx="60" cy="48" r="14" fill="#FBF7EE"/>
  <!-- Busto: spalle arrotondate -->
  <path
    d="M 30 95 C 30 75, 42 67, 60 67 C 78 67, 90 75, 90 95 L 90 106 L 30 106 Z"
    fill="#FBF7EE"/>
</svg>
