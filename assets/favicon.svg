<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ColloquiTeam">
  <!-- Sfondo arrotondato terracotta -->
  <rect width="64" height="64" rx="14" ry="14" fill="#8B3A1A"/>

  <!-- Radar: cerchi concentrici (sotto la persona) -->
  <g stroke="#FBF7EE" stroke-opacity=".22" fill="none" stroke-width="1">
    <circle cx="32" cy="32" r="26"/>
    <circle cx="32" cy="32" r="20"/>
    <circle cx="32" cy="32" r="14"/>
  </g>
  <!-- 8 raggi del radar (orizz/vert/diag, opacità bassa per non disturbare) -->
  <g stroke="#FBF7EE" stroke-opacity=".22" stroke-width="1">
    <line x1="32" y1="6" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
    <line x1="13.6" y1="13.6" x2="50.4" y2="50.4"/>
    <line x1="50.4" y1="13.6" x2="13.6" y2="50.4"/>
  </g>

  <!-- Poligono "valutazione" (8 vertici asimmetrici) -->
  <polygon
    points="32,8 50,18 56,32 49,48 32,54 17,49 8,32 16,16"
    fill="#FBF7EE" fill-opacity=".10"
    stroke="#FBF7EE" stroke-opacity=".45" stroke-width="1.2"
    stroke-linejoin="round"/>

  <!-- Silhouette persona (testa + busto) — focal point -->
  <!-- Testa -->
  <circle cx="32" cy="25" r="7.5" fill="#FBF7EE"/>
  <!-- Busto: forma a "U" arrotondata -->
  <path
    d="M 17 50 C 17 40, 23 36, 32 36 C 41 36, 47 40, 47 50 L 47 56 L 17 56 Z"
    fill="#FBF7EE"/>
</svg>
